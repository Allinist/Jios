name: Flutter CI/CD

# -----------------------
# 触发方式
# -----------------------
# 可以通过 push tag 或 workflow_dispatch 手动触发
on:
  push:
    tags:
      - 'v*'          # tag触发
    branches:
      - 'release'      # release 分支自动构建
  workflow_dispatch:   # 手动触发
    inputs:
      version:
        description: 'Version (e.g., 0.0.0)'
        required: true
        default: 'latest'
      platform:
        description: 'Platform to build (ios/android/all)'
        required: true
        default: 'all'

jobs:
  build:
    runs-on: macos-latest

    steps:
      # -----------------------
      # Checkout
      # -----------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # -----------------------
      # Setup Flutter
      # -----------------------
      - name: 🛠 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      # -----------------------
      # Cache Flutter & Packages
      # -----------------------
      - name: 📦 Cache Flutter
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            build
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}

      # CocoaPods 缓存
      - name: 📦 Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}

      # -----------------------
      # Dependencies
      # -----------------------
      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 📲 Precache iOS
        run: flutter precache --ios

      - name: 🧹 Clean build
        run: flutter clean

      - name: 🔄 Reinstall packages
        run: flutter pub get

      # -----------------------
      # Determine Platform
      # -----------------------
      - name: 🏷 Determine Platform
        id: platform
        run: |
          PLATFORM_INPUT="${{ github.event.inputs.platform }}"
          if [ -z "$PLATFORM_INPUT" ]; then
            PLATFORM_INPUT="all"
          fi
          echo "platform=$PLATFORM_INPUT" >> $GITHUB_ENV
          echo "Using platform: $PLATFORM_INPUT"

      # -----------------------
      # Android Build
      # -----------------------
      - name: 🤖 Build APK
        if: ${{ env.platform == 'android' || env.platform == 'all' }}
        run: flutter build apk --release

      - name: 🤖 Build AAB
        if: ${{ env.platform == 'android' || env.platform == 'all' }}
        run: flutter build appbundle

      # -----------------------
      # iOS Build
      # -----------------------
      - name: 📦 Install CocoaPods
        if: ${{ env.platform == 'ios' || env.platform == 'all' }}
        run: |
          cd ios
          pod install --repo-update

      - name: 🏗 Build iOS
        if: ${{ env.platform == 'ios' || env.platform == 'all' }}
        run: flutter build ios --release --no-codesign

      - name: 📦 Package IPA
        if: ${{ env.platform == 'ios' || env.platform == 'all' }}
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      # -----------------------
      # Upload Artifacts
      # -----------------------
      - name: 📤 Upload IPA
        if: ${{ env.platform == 'ios' || env.platform == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/app.ipa

      - name: 📤 Upload APK
        if: ${{ env.platform == 'android' || env.platform == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: 📤 Upload AAB
        if: ${{ env.platform == 'android' || env.platform == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # -----------------------
      # Publish GitHub Release
      # -----------------------
      - name: 📦 Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/ios/ipa/app.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}